<div class="top-header-bar">
  <!-- Menu toggle button (left) -->
  <button class="button" aria-label="Toggle sidebar" (click)="onToggleClick($event)">
    <div class="container">
      <!-- Hamburger icon -->
      <svg class="hamburger-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 12" fill="none">
        <line x1="0" y1="1" x2="18" y2="1" stroke="#374151" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="6" x2="18" y2="6" stroke="#374151" stroke-width="2" stroke-linecap="round" />
        <line x1="0" y1="11" x2="18" y2="11" stroke="#374151" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
  </button>

  <!-- Notification + Date (right) -->
  <div class="div">
    <!-- Date display -->
    <div class="margin">
      <div class="text-wrapper">{{ today }}</div>
    </div>
    <!-- Bell notification icon -->
    <div class="container-2">
      <svg class="bell-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#374151"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <div class="background-border"></div>
    </div>
  </div>
</div>
