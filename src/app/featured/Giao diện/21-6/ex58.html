<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 58: Neonatal Feeding Study</title>
    <style>
        body {
            background-color: #00008b; /* Deep Navy Blue */
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            width: 1280px; /* Constrained to match figma requirements */
            margin: 0 auto;
            box-sizing: border-box;
        }

        .form-container {
            border: 2px solid #ffffff;
            padding: 30px;
            background-color: #00008b;
        }

        /* Header Layout matching image */
        .header-section {
            border-bottom: 2px solid #ff6600;
            padding-bottom: 15px;
            margin-bottom: 25px;
            position: relative;
            min-height: 80px;
            padding-left: 100px; /* Space for logo */
        }

        .logo-img {
            position: absolute;
            left: 0;
            top: 0;
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .title-primary {
            color: #ffff00; /* Yellow */
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }

        .title-secondary {
            color: #ff6600; /* Orange */
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            text-align: right;
        }

        .title-main {
            text-align: center;
            font-size: 32px;
            color: #ffffff;
            margin: 20px 0;
            font-weight: bold;
        }

        /* Today block */
        .today-block {
            text-align: right;
            margin-bottom: 25px;
        }

        .today-block label {
            font-weight: bold;
            margin-right: 10px;
        }

        .today-block input {
            width: 120px;
            padding: 4px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #ffffff;
            background-color: #ffffff;
            color: #000000;
        }

        /* Form Grid Layout */
        .form-row {
            display: grid;
            grid-template-columns: 250px 1fr;
            margin-bottom: 15px;
            align-items: center;
        }

        .form-row label {
            font-weight: bold;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 15px;
        }

        input[type="text"],
        input[type="number"],
        select {
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #ffffff;
            border-radius: 2px;
            box-sizing: border-box;
        }

        .input-standard {
            width: 280px;
        }

        .input-half {
            width: 200px;
        }

        .input-small {
            width: 80px;
            text-align: center;
        }

        /* APGAR sub-grid layout */
        .apgar-section {
            margin-bottom: 20px;
        }

        .apgar-header {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .apgar-sub {
            font-size: 12px;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .apgar-row {
            display: grid;
            grid-template-columns: 250px 1fr;
            margin-bottom: 10px;
            align-items: center;
        }

        .apgar-label {
            padding-left: 20px;
            font-size: 13px;
        }

        /* Button row */
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn-action {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            padding: 6px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
            box-shadow: 2px 2px 0px #000000;
            transition: all 0.1s ease;
        }

        .btn-action:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000000;
        }

        .btn-action:hover {
            background-color: #eeeeee;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <!-- HEADER -->
        <div class="header-section">
            <!-- Checking if local media exists or fallback to empty image -->
            <img class="logo-img" src="media/Bai58/Logo.gif" onerror="this.style.display='none'; this.onerror=null;" alt="Logo">
            <h1 class="title-primary">St. Mary's of Northland Pines</h1>
            <div class="title-secondary">Research Hospital and Clinics</div>
        </div>

        <!-- MAIN TITLE -->
        <h2 class="title-main">Neonatal Feeding Study</h2>

        <!-- FORM -->
        <form id="study-form" novalidate>
            <!-- Today Block -->
            <div class="today-block">
                <label for="today-date">Today is:</label>
                <input type="text" id="today-date" readonly tabIndex="-1">
            </div>

            <!-- 1) Name -->
            <div class="form-row">
                <label>1) Name (first, last):</label>
                <div class="input-group">
                    <input type="text" id="first-name" class="input-half" placeholder="First Name" required>
                    <input type="text" id="last-name" class="input-half" placeholder="Last Name" required>
                </div>
            </div>

            <!-- 2) Medical Record # -->
            <div class="form-row">
                <label for="medical-record">2) Medical Record #:</label>
                <input type="text" id="medical-record" class="input-half" required>
            </div>

            <!-- 3) Date of birth -->
            <div class="form-row">
                <label for="dob">3) Date of birth:</label>
                <input type="text" id="dob" class="input-half" placeholder="mm/dd/yyyy" required>
            </div>

            <!-- 4) Physician -->
            <div class="form-row">
                <label for="physician">4) Physician:</label>
                <select id="physician" class="input-standard" required>
                    <option value="" disabled selected>Select Physician</option>
                    <option value="Dr. Warren Albert">Dr. Warren Albert</option>
                    <option value="Dr. Susan Stone">Dr. Susan Stone</option>
                    <option value="Dr. Michael Reed">Dr. Michael Reed</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-row" id="specify-row">
                <label for="specify">If other (specify):</label>
                <input type="text" id="specify" class="input-standard" disabled style="background-color: #cccccc;">
            </div>

            <!-- 5) APGAR Score -->
            <div class="apgar-section">
                <div class="apgar-header">5) 1 Minute APGAR Score:</div>
                <div class="apgar-sub">Each score must be 0, 1, or 2</div>

                <div class="apgar-row">
                    <span class="apgar-label">Activity</span>
                    <input type="number" id="activity" class="input-small score-input" min="0" max="2" required>
                </div>

                <div class="apgar-row">
                    <span class="apgar-label">Pulse</span>
                    <input type="number" id="pulse" class="input-small score-input" min="0" max="2" required>
                </div>

                <div class="apgar-row">
                    <span class="apgar-label">Grimace (Reflex, Irritability)</span>
                    <input type="number" id="grimace" class="input-small score-input" min="0" max="2" required>
                </div>

                <div class="apgar-row">
                    <span class="apgar-label">Appearance (Skin Color)</span>
                    <input type="number" id="appearance" class="input-small score-input" min="0" max="2" required>
                </div>

                <div class="apgar-row">
                    <span class="apgar-label">Respiration</span>
                    <input type="number" id="respiration" class="input-small score-input" min="0" max="2" required>
                </div>

                <div class="apgar-row" style="margin-top: 15px;">
                    <span class="apgar-label" style="font-weight: bold; font-size: 14px;">TOTAL</span>
                    <input type="text" id="total-score" class="input-small" readonly value="0" style="background-color: #eeeeee; font-weight: bold;">
                </div>
            </div>

            <!-- 6) Birth weight -->
            <div class="form-row">
                <div>
                    <label style="display: block;">6) Birth weight (gms):</label>
                    <span style="font-size: 11px; opacity: 0.9;">Weight must be >= 1200 gms.</span>
                </div>
                <input type="number" id="birth-weight" class="input-half" required>
            </div>

            <!-- 7) Parental Consent -->
            <div class="form-row" style="margin-top: 20px;">
                <label>7) Parental Consent (required):</label>
                <input type="checkbox" id="consent" required style="width: 18px; height: 18px;">
            </div>

            <!-- BUTTONS -->
            <div class="btn-row">
                <button type="submit" class="btn-action">Register</button>
                <button type="button" id="reload-btn" class="btn-action">Reload Page</button>
            </div>
        </form>
    </div>

    <script>
        // DOM Elements
        const form = document.getElementById('study-form');
        const todayInput = document.getElementById('today-date');
        const firstNameInput = document.getElementById('first-name');
        const lastNameInput = document.getElementById('last-name');
        const physicianSelect = document.getElementById('physician');
        const specifyInput = document.getElementById('specify');
        const apgarInputs = document.querySelectorAll('.score-input');
        const totalInput = document.getElementById('total-score');
        const birthWeightInput = document.getElementById('birth-weight');
        const consentCheckbox = document.getElementById('consent');
        const reloadBtn = document.getElementById('reload-btn');

        // 1. Load behavior
        window.addEventListener('DOMContentLoaded', () => {
            // Display today's date formatted as d/m/yyyy
            const today = new Date();
            const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;
            todayInput.value = dateStr;

            // Autofocus on first name
            firstNameInput.focus();
        });

        // 2. Physician Select change behavior
        physicianSelect.addEventListener('change', function() {
            if (this.value === 'other') {
                specifyInput.disabled = false;
                specifyInput.style.backgroundColor = '#ffffff';
                specifyInput.focus();
            } else {
                specifyInput.disabled = true;
                specifyInput.style.backgroundColor = '#cccccc';
                specifyInput.value = '';
            }
        });

        // 2. Physician Select focus-out/blur check
        // "nếu chọn other thì khi đưa trỏ ra ngoài sẽ xuất hiện thông báo yêu cầu nhập Name"
        physicianSelect.addEventListener('blur', function() {
            if (this.value === 'other') {
                // Check if main Name is empty
                if (!firstNameInput.value.trim() || !lastNameInput.value.trim()) {
                    alert('Thông báo: Yêu cầu nhập Name (first, last) của trẻ!');
                    firstNameInput.focus();
                }
            }
        });

        // Also check on specifyInput focus-out
        specifyInput.addEventListener('blur', function() {
            if (physicianSelect.value === 'other') {
                if (!this.value.trim()) {
                    alert('Thông báo: Vui lòng nhập tên Bác sĩ khác (Specify)!');
                    this.focus();
                } else if (!firstNameInput.value.trim() || !lastNameInput.value.trim()) {
                    alert('Thông báo: Yêu cầu nhập Name (first, last) của trẻ!');
                    firstNameInput.focus();
                }
            }
        });

        // 3. APGAR scores validation & calculation
        apgarInputs.forEach(input => {
            input.addEventListener('change', function() {
                const val = parseInt(this.value);
                if (isNaN(val) || val < 0 || val > 2) {
                    alert('Giá trị APGAR Score từng mục phải là 0, 1 hoặc 2!');
                    this.value = '';
                    this.focus();
                }
                calculateTotal();
            });
        });

        function calculateTotal() {
            let total = 0;
            apgarInputs.forEach(input => {
                const val = parseInt(input.value);
                if (!isNaN(val)) {
                    total += val;
                }
            });
            totalInput.value = total;
        }

        // 4. Birth weight verification
        birthWeightInput.addEventListener('change', function() {
            const val = parseFloat(this.value);
            if (isNaN(val) || val < 1200) {
                alert('Cân nặng sơ sinh (Birth weight) phải lớn hơn hoặc bằng 1200 gms!');
                this.value = '';
                this.focus();
            }
        });

        // Register action submit
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Perform manual validation checks
            if (!firstNameInput.value.trim() || !lastNameInput.value.trim()) {
                alert('Yêu cầu nhập đầy đủ Name (first, last)!');
                firstNameInput.focus();
                return;
            }

            if (!document.getElementById('medical-record').value.trim()) {
                alert('Yêu cầu nhập Medical Record #!');
                document.getElementById('medical-record').focus();
                return;
            }

            if (!document.getElementById('dob').value.trim()) {
                alert('Yêu cầu nhập Date of birth!');
                document.getElementById('dob').focus();
                return;
            }

            if (!physicianSelect.value) {
                alert('Vui lòng chọn Bác sĩ chỉ định!');
                physicianSelect.focus();
                return;
            }

            if (physicianSelect.value === 'other' && !specifyInput.value.trim()) {
                alert('Vui lòng nhập tên Bác sĩ chỉ định (Specify)!');
                specifyInput.focus();
                return;
            }

            // Verify APGAR completeness
            let scoresIncomplete = false;
            apgarInputs.forEach(input => {
                if (input.value === '') scoresIncomplete = true;
            });
            if (scoresIncomplete) {
                alert('Vui lòng nhập đầy đủ các chỉ số APGAR Score!');
                return;
            }

            if (!birthWeightInput.value.trim()) {
                alert('Vui lòng nhập cân nặng sơ sinh (Birth weight)!');
                birthWeightInput.focus();
                return;
            }

            if (!consentCheckbox.checked) {
                alert('Yêu cầu phải có sự đồng ý của cha mẹ (Parental Consent required)!');
                return;
            }

            alert('Đăng ký nghiên cứu thành công (Study Registered Successfully)!');
        });

        // Reload action behavior
        reloadBtn.addEventListener('click', () => {
            form.reset();
            specifyInput.disabled = true;
            specifyInput.style.backgroundColor = '#cccccc';
            totalInput.value = '0';

            // Re-set today's date
            const today = new Date();
            const dateStr = `${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;
            todayInput.value = dateStr;

            firstNameInput.focus();
        });
    </script>
</body>
</html>
