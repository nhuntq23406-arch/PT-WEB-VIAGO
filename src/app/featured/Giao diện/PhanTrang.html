<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ phân trang - VIAGO</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #123063;
            --primary-hover: #0a1f44;
            --secondary-color: #f96d00;
            --secondary-hover: #e05e00;
            --text-color: #333333;
            --text-light: #666666;
            --bg-light: #f8f9fa;
            --bg-white: #ffffff;
            --border-color: #eeeeee;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-white);
            font-family: var(--font-main);
            color: var(--text-color);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .page-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            border: 1px solid #dce1e7;
            background-color: var(--bg-white);
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
            box-sizing: border-box;
        }

        .page-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: rgba(18, 48, 99, 0.02);
        }

        .page-btn.active {
            border-color: #a5b4fc;
            background-color: #f1f5f9;
            color: var(--primary-color);
        }

        .page-btn.dots {
            border-color: transparent;
            background: none;
            cursor: default;
        }

        .page-btn svg {
            width: 10px;
            height: 10px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="pagination">
        <button class="page-btn">
            <svg viewBox="0 0 24 24"><polygon points="14,7 8,12 14,17"/></svg>
        </button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">4</button>
        <button class="page-btn">5</button>
        <span class="page-btn dots">...</span>
        <button class="page-btn">92</button>
        <button class="page-btn">93</button>
        <button class="page-btn">
            <svg viewBox="0 0 24 24"><polygon points="10,7 16,12 10,17"/></svg>
        </button>
    </div>

</body>
</html>
