<div class="login-page-container">
  <div class="login-card">
    <div class="logo-container">
      <img src="/asset/img/admin/logoVIAGO.png" alt="VIAGO Logo" class="login-logo" />
    </div>

    <h1 class="login-title">Đăng nhập quản trị</h1>
    <p class="login-subtitle">Dành riêng cho nhân viên và quản trị viên</p>

    <form class="login-form" (submit)="onLogin($event)">
      <div class="form-group">
        <label for="username" class="form-label">Tài khoản hoặc Email</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-svg">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
          </span>
          <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập hoặc email" class="form-input" />
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Mật khẩu</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-svg">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" class="form-input" />
        </div>
      </div>

      <button type="submit" class="btn-submit">Đăng nhập</button>
    </form>

    <div class="back-link-container">
      <a routerLink="/" class="back-link">Quay lại trang khách hàng</a>
    </div>
  </div>
</div>
