<div class="relative w-full">
  <div class="flex items-center gap-2 mb-1">
    <img *ngIf="iconPath" [src]="iconPath" class="w-4 h-4 object-contain" alt="input icon" />
    <label *ngIf="label" [for]="id" class="text-[13px] font-semibold text-[#1E3A8A] uppercase tracking-wider">
      {{ label }}
    </label>
  </div>




  <!-- Input Wrapper -->
  <div class="relative flex items-center">
    <!-- Input Box -->
    <input
      #inputEl
      [id]="id"
      type="text"
      [(ngModel)]="searchText"
      (focus)="onFocus()"
      (input)="onInput()"
      (keydown)="onKeyDown($event)"
      [placeholder]="placeholder"
      class="w-full bg-slate-50 border border-slate-200 focus:border-[#00236F] focus:bg-white text-gray-800 placeholder-slate-400 font-medium text-base py-3.5 rounded-lg outline-none transition-all duration-200 shadow-sm pl-4"
      [class.pr-16]="searchText"
      [class.pr-10]="!searchText"
    />

    <!-- Clear (X) Button -->
    <button
      *ngIf="searchText"
      type="button"
      (click)="clearValue($event)"
      class="absolute right-9 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none transition-all duration-150 flex items-center justify-center p-0.5 rounded-full hover:bg-slate-100"
      style="right: 2.25rem;"
    >
      <!-- Circular X icon as in Hình 1 -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="w-4 h-4 text-slate-400 hover:text-slate-500"
      >
        <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25Zm-1.72 6.97a.75.75 0 1 0-1.06 1.06L10.94 12l-1.72 1.72a.75.75 0 1 0 1.06 1.06L12 13.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L13.06 12l1.72-1.72a.75.75 0 1 0-1.06-1.06L12 10.94l-1.72-1.72Z" clip-rule="evenodd" />
      </svg>
    </button>

    <!-- Dropdown Arrow Icon -->
    <button
      type="button"
      (click)="toggleDropdown($event)"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none transition-transform duration-300"
      [class.rotate-180]="isOpen"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2.5"
        stroke="currentColor"
        class="w-4 h-4"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    </button>
  </div>


  <!-- Dropdown Menu -->
  <div
    *ngIf="isOpen"
    class="absolute z-50 left-0 right-0 mt-1 bg-white border border-slate-100 rounded-lg shadow-lg max-h-60 overflow-y-auto py-1 scrollbar-thin scrollbar-thumb-slate-200 scrollbar-track-transparent transition-all duration-200"
  >
    <!-- List Items -->
    <ul *ngIf="filteredItems.length > 0; else noResults">
      <li
        *ngFor="let item of filteredItems"
        (mousedown)="selectItem(item)"
        class="px-4 py-2.5 hover:bg-slate-50 text-gray-700 font-medium text-sm cursor-pointer transition-colors duration-150 flex items-center justify-between"
        [class.bg-blue-50]="item === value"
        [class.text-[#00236F]]="item === value"
      >
        <span>{{ item }}</span>
        <!-- Checkmark icon if selected -->
        <svg
          *ngIf="item === value"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="w-4 h-4 text-[#00236F]"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
      </li>
    </ul>


    <!-- No Results Found -->
    <ng-template #noResults>
      <div class="px-4 py-3 text-gray-500 text-sm text-center italic">
        Không tìm thấy địa điểm
      </div>
    </ng-template>
  </div>
</div>
