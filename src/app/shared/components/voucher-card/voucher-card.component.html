<div 
  [class]="'relative flex border rounded-2xl overflow-hidden shadow-sm transition-all min-h-[110px] w-full ' + 
    (context === 'checkout' ? 'cursor-pointer ' : '') +
    (context === 'checkout' && isSelected ? 'border-[#FF6600] bg-orange-50/30' : 'border-orange-200 bg-[#FFF9F5]')"
  (click)="context === 'checkout' ? onSelect.emit() : null"
>
  <!-- Tear-off circle cutouts (top and bottom of the divider line at 35%) -->
  <div class="absolute right-[35%] -top-2.5 w-4.5 h-4.5 bg-white rounded-full border-b border-orange-200 z-10"></div>
  <div class="absolute right-[35%] -bottom-2.5 w-4.5 h-4.5 bg-white rounded-full border-t border-orange-200 z-10"></div>

  <!-- Left Section (Voucher Details) -->
  <div class="w-[65%] p-4 flex flex-col justify-between pr-6 border-r border-dashed border-orange-200">
    <div>
      <div class="text-base font-extrabold text-[#FF6600] flex items-center gap-1.5 leading-none">
        {{ voucher.title }}
      </div>
      <div class="text-[10px] text-slate-500 font-semibold mt-2.5 leading-relaxed">
        {{ voucher.description }}
      </div>
    </div>
    <div class="text-[10px] text-slate-400 font-bold mt-2 flex items-center gap-1 flex-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 text-slate-400 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
      </svg>
      <span>HSD: {{ voucher.expiryDate }}</span>
      <span *ngIf="context === 'wallet' && voucher.count" class="text-slate-450 font-black text-[9.5px] ml-1">
        x{{ voucher.count }}
      </span>
    </div>
  </div>

  <!-- Right Section (Action Button or Radio Selection) -->
  <div class="w-[35%] p-3 flex flex-col items-center justify-center bg-[#FFFDFB] relative shrink-0 gap-2">
    <!-- Context: Checkout -->
    <ng-container *ngIf="context === 'checkout'">
      <!-- Show Code above selector -->
      <span class="text-[9.5px] font-bold bg-orange-100/70 border border-orange-200 border-dashed text-[#FF6600] px-2 py-0.5 rounded tracking-wide uppercase select-none mb-1 text-center">
        {{ voucher.code }}
      </span>
      <div class="flex items-center justify-center">
        <div 
          [class]="'w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ' + 
            (isSelected ? 'border-[#FF6600] bg-[#FF6600]' : 'border-slate-300 bg-white')"
        >
          <div *ngIf="isSelected" class="w-1.5 h-1.5 rounded-full bg-white"></div>
        </div>
      </div>
    </ng-container>

    <!-- Context: Home / Wallet -->
    <ng-container *ngIf="context !== 'checkout'">
      <!-- Voucher Code Text (Always placed right above CTA) -->
      <span class="text-[9.5px] font-bold bg-orange-100/70 border border-orange-200 border-dashed text-[#FF6600] px-2 py-0.5 rounded tracking-wide uppercase select-none text-center">
        {{ voucher.code }}
      </span>

      <!-- Guest on Home page -> Copy -->
      <button 
        *ngIf="context === 'home' && !user"
        (click)="onActionClick($event)"
        class="w-full py-2 bg-[#FF6A00] hover:bg-[#e05900] active:bg-[#c74e00] text-white rounded-xl text-[10px] font-extrabold shadow-sm transition-all cursor-pointer border-0 text-center uppercase tracking-wider"
      >
        Sao chép
      </button>

      <!-- Member on Home page -> Save / Saved -->
      <ng-container *ngIf="context === 'home' && user">
        <button 
          *ngIf="!isClaimed"
          (click)="onActionClick($event)"
          class="w-full py-2 bg-[#FF6A00] hover:bg-[#e05900] active:bg-[#c74e00] text-white rounded-xl text-[10px] font-extrabold shadow-sm transition-all cursor-pointer border-0 text-center uppercase tracking-wider"
        >
          Lưu
        </button>
        <button 
          *ngIf="isClaimed"
          disabled
          class="w-full py-2 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-extrabold transition-all border-0 text-center uppercase tracking-wider cursor-not-allowed select-none"
        >
          Đã lưu
        </button>
      </ng-container>

      <!-- Member in Wallet -> Dùng ngay (Orange background color and stretched) -->
      <button 
        *ngIf="context === 'wallet'"
        (click)="onActionClick($event)"
        class="w-full py-2 bg-[#FF6A00] hover:bg-[#e05900] active:bg-[#c74e00] text-white rounded-xl text-[10px] font-extrabold shadow-sm transition-all cursor-pointer border-0 text-center uppercase tracking-wider"
      >
        Dùng ngay
      </button>
    </ng-container>
  </div>
</div>
